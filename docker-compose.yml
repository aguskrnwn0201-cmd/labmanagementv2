version: '3.8'

services:
  mysql:
    image: mysql:8.4
    container_name: lab_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: m41k3l
      MYSQL_DATABASE: lab_ma
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - lab-network

  app:
    build: .
    container_name: lab_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    networks:
      - lab-network
    depends_on:
      - mysql

  webserver:
    image: nginx:alpine
    container_name: lab_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge

volumes:
  mysql_data: